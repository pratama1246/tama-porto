<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Polaroid background frame -->
  <rect x="2" y="2" width="28" height="28" rx="3" fill="#ffffff" stroke="#2d2d2d" stroke-width="2" />
  <!-- Inner photo area (pastel yellow accent) -->
  <rect x="5" y="5" width="22" height="17" rx="1" fill="#ffeaa7" stroke="#2d2d2d" stroke-width="2" />
  <!-- Cute smiley face in the photo area -->
  <circle cx="12" cy="12" r="1.5" fill="#2d2d2d" />
  <circle cx="20" cy="12" r="1.5" fill="#2d2d2d" />
  <path d="M12,16 Q16,19 20,16" stroke="#2d2d2d" stroke-width="1.5" stroke-linecap="round" fill="none" />
  <!-- Tape/sticker decoration at the top (pastel pink accent) -->
  <rect x="10" y="1" width="12" height="4" fill="#ffb3c6" transform="rotate(-5, 16, 3)" stroke="#2d2d2d" stroke-width="1" />
</svg>